<h2 mat-dialog-title>Edit Restaurant</h2>

<mat-dialog-content>
  <form [formGroup]="editForm" class="edit-dialog-form">
    
    <mat-form-field appearance="outline">
      <mat-label>Restaurant Name</mat-label>
      <input matInput formControlName="name" /> 
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Restaurant Location</mat-label>
      <input matInput formControlName="location" /> 
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Price Range</mat-label>
      <mat-select formControlName="priceRange">
        <mat-option [value]="1">$</mat-option>
        <mat-option [value]="2">$$</mat-option>
        <mat-option [value]="3">$$$</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button class="bg-pink-accent" (click)="onSaveUpdate()" [disabled]="editForm.invalid">Save</button>
</mat-dialog-actions>
