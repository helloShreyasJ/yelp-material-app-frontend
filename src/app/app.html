<div> 
  <h1 id="add-restaurants-header" class="mat-headline-1">Add Restaurants</h1>

  <form>
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. McDonalds">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" placeholder="e.g. Galway">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Price Range</mat-label>
      <mat-select formControlName="priceRange">
        <mat-option value="$">$</mat-option>
        <mat-option value="$$">$$</mat-option>
        <mat-option value="$$$">$$$</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-button class="bg-pink-accent">
      <mat-icon>add_circle_outline</mat-icon> Add
    </button>
  </form>

  <table mat-table [dataSource]="restaurantsList()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Restaurant </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Location </th>
      <td mat-cell *matCellDef="let element"> {{element.location}} </td>
    </ng-container>

    <ng-container matColumnDef="priceRange">
      <th mat-header-cell *matHeaderCellDef> Price Range </th>
      <td mat-cell *matCellDef="let element"> {{element.priceRange}} </td>
    </ng-container>

    <ng-container matColumnDef="rating">
      <th mat-header-cell *matHeaderCellDef> Ratings </th>
      <td mat-cell *matCellDef="let element">
        <!--TODO-->
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element" class="text-right-align">
        <button mat-icon-button type="button">
          <mat-icon>more_vert</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
