<div> 
  <h1 id="add-restaurants-header" class="mat-headline-1">Add Restaurants</h1>

  <form>
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. McDonalds">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" placeholder="e.g. Galway">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Price Range</mat-label>
      <mat-select formControlName="priceRange">
        <mat-option value="$">$</mat-option>
        <mat-option value="$$">$$</mat-option>
        <mat-option value="$$$">$$$</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-button class="bg-pink-accent">
      <mat-icon>add_circle_outline</mat-icon> Add
    </button>
    
  </form>
</div>
